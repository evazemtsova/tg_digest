name: digest

on:
  schedule:
    - cron: "0 6 * * *"   # 09:00 MSK
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_B64: ${{ secrets.TG_SESSION_B64 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/main.py

      - name: Commit & push results
        run: |
          git config user.name  "tg-digest-bot"
          git config user.email "tg-digest-bot@users.noreply.github.com"
          git add index.html data/vacancies.json data/history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "digest: $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
